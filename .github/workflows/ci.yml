# 持续集成：push / PR 时跑格式校验 + clippy + 测试。
# 与 release.yml（tag 触发打包）解耦——本工作流只做代码质量门禁。

name: ci

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup component add rustfmt clippy

      - name: Cargo cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ci-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      # GPUI Linux 编译依赖（与 release.yml 一致）
      - name: Install Linux system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libxkbcommon-x11-dev libfontconfig1-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev libgl1-mesa-dev libegl1-mesa-dev \
            libglib2.0-dev libssl-dev \
            mesa-vulkan-drivers
          sudo apt-get install -y vulkan-utility-libraries-dev || true

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --lib
