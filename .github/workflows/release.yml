# 多平台打包 / 发布。
#
# 触发：
# - 打 tag `v*`（如 v0.1.0）→ 三平台编译 release + 打包 + 发 GitHub Release。
# - Actions 页手动 `workflow_dispatch` → 只构建 + 传 artifact，不发 Release。
#
# Matrix：
# - windows-x86_64  → zip
# - macos-aarch64   → tar.gz（arm64，Apple Silicon）
# - macos-x86_64    → tar.gz（Intel，cross 到 x86_64-apple-darwin）
# - linux-x86_64    → tar.gz（复用 scripts/package-linux.sh）
# - linux-aarch64   → tar.gz（原生 arm64 runner）
#
# 产物命名：so-novel-rs-<version>-<os>-<arch>.<ext>，发 Release 时按名上传。
#
# GPUI 0.2.2 Linux 编译依赖（apt dev 包）：xkbcommon / fontconfig / xcb / wayland / gl / egl
# + Vulkan headers（blade-graphics）。macOS / Windows 用系统 framework，无需额外包。

name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "只构建传 artifact，不发 Release"
        required: false
        default: "true"

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux 走 GitHub ubuntu runner 原生 toolchain，rustup target 已装。
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          # Linux aarch64 走 GitHub 原生 arm64 runner（ubuntu-24.04-arm），无需 cross/qemu。
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          # macOS Apple Silicon 原生。
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          # Windows x86_64 原生 MSVC。
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          # 注：去掉 `macos-latest / x86_64-apple-darwin / cross: true`：
          # cross 装 macOS x86 toolchain 在 GitHub Actions 上经常卡 / 失败，
      # 且 Intel Mac 用户少。如需加回来改用 `macos-13` runner 原生编译。

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxkbcommon-dev libfontconfig1-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libwayland-dev libgl1-mesa-dev libegl1-mesa-dev \
            libglib2.0-dev libssl-dev \
            mesa-vulkan-drivers
          # vulkan-validationlayers-dev 在 ubuntu-latest 已不可用（被 vulkan-utility-libraries-dev 替代），
          # 链接 vulkan 只需要 headers —— vulkan-utility-libraries-dev 提供。
          sudo apt-get install -y vulkan-utility-libraries-dev || true

      - name: Build (release)
        shell: bash
        run: cargo build --release --target ${{ matrix.target }}

      - name: Read version
        id: ver
        shell: bash
        run: |
          v=$(grep -E '^version\s*=' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=$v" >> "$GITHUB_OUTPUT"

      # ---- 打包 ----
      # Linux 复用 scripts/package-linux.sh（已含字体 + README + tar.gz）。
      - name: Stage artifacts (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: bash scripts/package-linux.sh "${{ matrix.target }}"

      - name: Stage artifacts (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          STAGE: so-novel-rs-${{ steps.ver.outputs.version }}-macos-${{ matrix.target == 'aarch64-apple-darwin' && 'aarch64' || 'x86_64' }}
        run: |
          BIN="target/${{ matrix.target }}/release/so-novel-rs"
          mkdir -p "dist/$STAGE/bundle"
          cp "$BIN" "dist/$STAGE/"
          chmod +x "dist/$STAGE/so-novel-rs"
          [ -d bundle/fonts ] && cp -r bundle/fonts "dist/$STAGE/bundle/" || true
          ( cd dist && tar -czf "$STAGE.tar.gz" "$STAGE" )

      - name: Stage artifacts (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          STAGE: so-novel-rs-${{ steps.ver.outputs.version }}-windows-x86_64
        run: |
          BIN="target/${{ matrix.target }}/release/so-novel-rs.exe"
          mkdir -p "dist/$STAGE/bundle"
          cp "$BIN" "dist/$STAGE/"
          [ -d bundle/fonts ] && cp -r bundle/fonts "dist/$STAGE/bundle/" || true
          ( cd dist && 7z a -tzip "$STAGE.zip" "$STAGE" )

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # tag 触发才发 Release；workflow_dispatch 只留 artifact。
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List assets
        shell: bash
        run: find dist -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
