  filter:
    placeholder:
      en: "Filter by name or URL…"
      zh-CN: 按名称或 URL 过滤…
      zh-TW: 按名稱或 URL 過濾…
  status:
    all:
      en: All
      zh-CN: 全部
      zh-TW: 全部
    enabled:
      en: Enabled
      zh-CN: 启用
      zh-TW: 啟用
    disabled:
      en: Disabled
      zh-CN: 禁用
      zh-TW: 停用
  stat:
    total:
      en: Total
      zh-CN: 总数
      zh-TW: 總數
    enabled:
      en: Enabled
      zh-CN: 启用
      zh-TW: 啟用
    disabled:
      en: Disabled
      zh-CN: 禁用
      zh-TW: 停用
    available:
      en: Available
      zh-CN: 可用
      zh-TW: 可用
  health:
    progress:
      en: "checked"
      zh-CN: 已检测
      zh-TW: 已偵測
    # StatusBadge 显示在书源行右侧的 4 种标签（对应 `health_status_label`）。
    not_tested:
      en: "Not tested"
      zh-CN: 未测
      zh-TW: 未測
    error:
      en: Error
      zh-CN: 错误
      zh-TW: 錯誤
    # 2xx 健康 —— 测速核心信号，只显示延迟（毫秒）。
    latency:
      en: "{ms}ms"
      zh-CN: "{ms} ms"
      zh-TW: "{ms} ms"
