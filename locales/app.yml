# So Novel 自己的 i18n 翻译表。
#
# 加载方式：编译期由 `rust_i18n::i18n!("locales", fallback = "en")` 嵌入二进制。
# 跟 `gpui-component` 的 `locales/ui.yml` **不共享**（各自 crate 独立的 i18n 实例），
# 但**全局 locale 是同一个**（`gpui_component::set_locale` 写到全局），
# 所以一次 set_locale 同时影响两边的翻译。
#
# 格式参考 gpui-component 的 `locales/ui.yml`：
# - `_version: 2` 顶层
# - 顶层 key 大写（Nav / App / Settings / …）
# - 每 key 下面是 locale → text 映射
#
# 3 种语言：zh-CN / zh-TW / en

_version: 2

Nav:
  search:
    en: Search
    zh-CN: 搜索下载
    zh-TW: 搜尋下載
  tasks:
    en: Tasks
    zh-CN: 下载任务
    zh-TW: 下載任務
  library:
    en: Library
    zh-CN: 本地书库
    zh-TW: 本地書庫
  sources:
    en: Sources
    zh-CN: 书源管理
    zh-TW: 書源管理
  settings:
    en: Settings
    zh-CN: 设置
    zh-TW: 設定

# 跨页面 / 跨模块的通用 toast 文案（不归属某个页面）。
Toasts:
  # 通用动作结果
  delete_source_ok:
    en: "Source #{id} deleted"
    zh-CN: "已删除书源 #{id}"
    zh-TW: "已刪除書源 #{id}"
  delete_source_missing:
    en: "Source no longer exists"
    zh-CN: 书源已不存在
    zh-TW: 書源已不存在
  switch_source_file_ok:
    en: "Switched to rule file: {filename}"
    zh-CN: "已切换到书源文件: {filename}"
    zh-TW: "已切換到書源檔案: {filename}"
  no_sources_detected:
    en: "No sources detected"
    zh-CN: 没有可检测的书源
    zh-TW: 沒有可檢測的書源
  clear_tasks_ok:
    en: "Cleared {n} record(s)"
    zh-CN: "已清除 {n} 条记录"
    zh-TW: "已清除 {n} 條記錄"
  # 更新检查（AppModel::update_state → events::drain 翻译）
  update_up_to_date:
    en: "Already up to date"
    zh-CN: 已是最新版本
    zh-TW: 已是最新版本
  update_new_version:
    en: "New version {ver} available"
    zh-CN: "新版本 {ver} 可用"
    zh-TW: "新版本 {ver} 可用"
  update_failed:
    en: "Update check failed: {err}"
    zh-CN: "检查更新失败: {err}"
    zh-TW: "檢查更新失敗: {err}"
  # 本地书库扫描 / 删除错误文案（AppModel::library.last_error 值）
  library_scan_failed:
    en: "Failed to scan download directory: {err}"
    zh-CN: "扫描下载目录失败: {err}"
    zh-TW: "掃描下載目錄失敗: {err}"
  library_delete_ok:
    en: "Deleted: {file}"
    zh-CN: "已删除: {file}"
    zh-TW: "已刪除: {file}"
  library_delete_unknown:
    en: "(unknown)"
    zh-CN: "(未知)"
    zh-TW: "(未知)"
  library_delete_failed:
    en: "Delete failed: {err}"
    zh-CN: "删除失败: {err}"
    zh-TW: "刪除失敗: {err}"

  # 任务删除反馈（TasksPage::prompt_delete 的 on_ok → AppModel::delete_task）
  # {book_name} 与 Tasks.delete_dialog.message 同源 —— 调用方已做空名兜底。
  delete_task_ok:
    en: 'Deleted: "{book_name}"'
    zh-CN: '已删除: "{book_name}"'
    zh-TW: '已刪除: "{book_name}"'
  # false 原因 1：仍然在运行。
  delete_task_still_running:
    en: 'Cannot delete: "{book_name}" is still running'
    zh-CN: '无法删除: "{book_name}" 仍在运行'
    zh-TW: '無法刪除: "{book_name}" 仍在執行'
  # false 原因 2：任务已被并发清掉 / 不存在。
  delete_task_missing:
    en: 'Task no longer exists'
    zh-CN: '任务已不存在'
    zh-TW: '任務已不存在'

