  desc:
    theme:
      en: "Choose the UI theme; changes take effect immediately."
      zh-CN: 选择界面主题；改动即时生效。
      zh-HK: 選擇界面主題；改動即時生效。
    app_lang:
      en: "App UI language; affects Sidebar search / Select / Dialog placeholders, etc. Changes take effect immediately."
      zh-CN: 应用 UI 显示语言；影响 Sidebar 搜索框 / Select / Dialog 等所有 gpui-component 内部文案。改动即时生效。
      zh-HK: 應用 UI 顯示語言；影響 Sidebar 搜尋框 / Select / Dialog 等所有 gpui-component 內部文案。改動即時生效。
    gh_proxy:
      en: "Used to speed up release / raw asset downloads; leave empty to use default."
      zh-CN: 用于加速 release / raw 资源下载；留空走默认。
      zh-HK: 用於加速 release / raw 資源下載；留空走預設。
    cf_bypass:
      en: "Base URL of a local or remote sarperavci/CloudflareBypass service."
      zh-CN: 本地或远端 sarperavci/CloudflareBypass 服务的 base URL。
      zh-HK: 本地或遠端 sarperavci/CloudflareBypass 服務的 base URL。
    download_path:
      en: "Directory to save downloaded book files (absolute path)."
      zh-CN: 书籍文件保存目录（绝对路径）。
      zh-HK: 書籍檔案儲存目錄（絕對路徑）。
    default_format:
      en: "Output format for downloaded files."
      zh-CN: 下载完成的文件输出格式。
      zh-HK: 下載完成的檔案輸出格式。
    txt_encoding:
      en: "Character encoding for TXT export; pick GBK for older devices."
      zh-CN: TXT 导出的字符编码；如需兼容旧设备选 GBK。
      zh-HK: TXT 匯出的字元編碼；如需相容舊裝置選 GBK。
    preserve_chapter_cache:
      en: "When disabled, re-downloading will fetch all chapters from scratch."
      zh-CN: 关闭后下次重新下载会全章节再爬。
      zh-HK: 關閉後下次重新下載會全章節再爬。
    enable_progressbar:
      en: "Takes effect in terminal / CLI mode."
      zh-CN: 终端/CLI 模式下生效。
      zh-HK: 終端/CLI 模式下生效。
    book_lang:
      en: "Locale hint used when matching sources (zh_CN / zh_TW / zh_Hant); affects source filtering only, not the app UI."
      zh-CN: 书源匹配时使用的 locale hint（zh_CN / zh_TW / zh_Hant）；只影响书源筛选，不影响应用 UI。
      zh-HK: 書源比對時使用的 locale hint（zh_CN / zh_TW / zh_Hant）；只影響書源篩選，不影響應用 UI。
    search_limit:
      en: "Max results per source; -1 means unlimited."
      zh-CN: 每源最多返回条数；-1 表示不限。
      zh-HK: 每源最多返回條數；-1 表示不限。
    search_filter:
      en: "Filter out low-similarity results and sort by title/author similarity."
      zh-CN: 根据标题/作者相似度过滤无效结果并按相似度排序。
      zh-HK: 根據標題/作者相似度過濾無效結果並按相似度排序。
    concurrency:
      en: "-1 = auto: min(50, chapter count)."
      zh-CN: "-1 = 自动：min(50, 章节数)。"
      zh-HK: "-1 = 自動：min(50, 章節數)。"
    min_interval:
      en: "min ≤ max; wait a random ms in [min..max] before each chapter fetch."
      zh-CN: min ≤ max；抓每章前等 [min..max] 内的随机 ms。
      zh-HK: min ≤ max；擷取每章前等 [min..max] 內的隨機 ms。
    max_interval:
      en: "See the previous item."
      zh-CN: 见上一项。
      zh-HK: 見上一項。
    enable_retry:
      en: "On chapter fetch failure, retry with the intervals below; give up after max retries."
      zh-CN: 章节下载失败时按下方间隔重试，达到上限后视为放弃。
      zh-HK: 章節下載失敗時按下方間隔重試，達到上限後視為放棄。
    max_retries:
      en: "0 = no retry."
      zh-CN: "0 = 不重试。"
      zh-HK: "0 = 不重試。"
    retry_min_interval:
      en: "min ≤ max; wait a random ms in [min..max] between retries."
      zh-CN: min ≤ max；两次重试之间等 [min..max] 内的随机 ms。
      zh-HK: min ≤ max；兩次重試之間等 [min..max] 內的隨機 ms。
    retry_max_interval:
      en: "See the previous item."
      zh-CN: 见上一项。
      zh-HK: 見上一項。
    proxy_enabled:
      en: "Route all outbound requests through this proxy (source fetch + health check)."
      zh-CN: 所有出站请求都走此代理（书源 fetch + 测速）。
      zh-HK: 所有出站請求都走此代理（書源 fetch + 測速）。
    proxy_host:
      en: "Proxy server address (IP or domain)."
      zh-CN: 代理服务器地址（IP 或域名）。
      zh-HK: 代理伺服器地址（IP 或域名）。
    proxy_port:
      en: "Proxy server port (1-65535)."
      zh-CN: 代理服务器端口（1-65535）。
      zh-HK: 代理伺服器埠（1-65535）。
    qidian_cookie:
      en: "Required for qidian.com / qidian overseas sites; can be ignored for other sources."
      zh-CN: 起点中文网 / 起点海外站点需要；其它书源可忽略。
      zh-HK: 起點中文網 / 起點海外站點需要；其它書源可忽略。
    version:
      en: "So Novel — Rust + GPUI desktop client."
      zh-CN: "So Novel — Rust + GPUI 桌面客户端。"
      zh-HK: "So Novel — Rust + GPUI 桌面用戶端。"
    check_update:
      en: "Query GitHub releases for a newer version."
      zh-CN: 查询 GitHub releases 是否有新版本。
      zh-HK: 查詢 GitHub releases 是否有新版本。
    open_github:
      en: "Source code / issue tracker / latest release are all on GitHub."
      zh-CN: 项目源码 / 问题反馈 / 最新版本都在 GitHub。
      zh-HK: 項目源碼 / 問題回饋 / 最新版本都在 GitHub。
