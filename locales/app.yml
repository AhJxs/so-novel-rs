# + handler 中散落的内联字符串（6 个 success body / 资源标识 / HTTP status）。
# 长度 ≤ 30 字（避免泄漏内部细节），由 `WebError::IntoResponse` 序列化进
# `{ error: { code, message } }` body。3 种 locale 同步维护。
