# 本地书库页面（`src/gpui_app/pages/library.rs`）所有面向用户的字符串。
# 设计要点：
# - 序号（#xx）是 row 内的全局序号列文本，由 Rust 端 format!，不需要翻译。
# - 「全部」/「打开」/「位置」/「删除」/「取消」是按钮标签，跟 Settings 按钮分开
#   命名空间（Library.*）—— 即便日后 Settings 改文案也不会牵扯 Library。
# 下载任务管理页。原 tasks.rs 全是硬编码中文，这次迁移到 i18n + 新增 tab / 删除文案。
Tasks:
  page_title:
    en: Downloads
    zh-CN: 下载任务
    zh-HK: 下載任務
  # Header subtitle —— 不再堆统计数字，给一句功能描述
  subtitle:
    en: "Track download progress; manage completed / failed / cancelled tasks"
    zh-CN: "查看下载进度，管理已完成 / 失败 / 已取消的任务"
    zh-HK: "查看下載進度，管理已完成 / 失敗 / 已取消的任務"
  # 按状态分组的过滤按钮 label —— 后缀由 Rust 端拼上数量（如 "已完成 10"）。
  # 「全部」是第一个按钮，不限状态。
  tab:
    all:
      en: All
      zh-CN: 全部
      zh-HK: 全部
    running:
      en: Running
      zh-CN: 运行中
      zh-HK: 運行中
    completed:
      en: Completed
      zh-CN: 已完成
      zh-HK: 已完成
    failed:
      en: Failed
      zh-CN: 失败
      zh-HK: 失敗
    cancelled:
      en: Cancelled
      zh-CN: 已取消
      zh-HK: 已取消
  # 删除单条任务的二次确认 Dialog
  delete_dialog:
    title:
      en: "Confirm delete"
      zh-CN: 确认删除
      zh-HK: 確認刪除
    # {book_name} 占位符
    message:
      en: 'Delete the download record for "{book_name}"? This action cannot be undone.'
      zh-CN: "确定要删除《{book_name}》的下载记录吗？此操作无法撤销。"
      zh-HK: "確定要刪除《{book_name}》的下載記錄嗎？此操作無法撤銷。"
    confirm_button:
      en: Delete
      zh-CN: 删除
      zh-HK: 刪除
    cancel_button:
      en: Cancel
      zh-CN: 取消
      zh-HK: 取消
  # 下载完成 toast（事件桥接在 events::drain 检测 was_running → finished 转换时推）。
  # {book_name} 占位符。
  download_finished:
    completed:
      en: 'Download completed: "{book_name}"'
      zh-CN: "下载完成：《{book_name}》"
      zh-HK: "下載完成：《{book_name}》"
    failed:
      en: 'Download failed: "{book_name}"'
      zh-CN: "下载失败：《{book_name}》"
      zh-HK: "下載失敗：《{book_name}》"
    cancelled:
      en: 'Download cancelled: "{book_name}"'
      zh-CN: "下载已取消：《{book_name}》"
      zh-HK: "下載已取消：《{book_name}》"
  # 空态：每个过滤各自的空态文案
  empty:
    all:
      title:
        en: "No downloads yet"
        zh-CN: 暂无下载任务
        zh-HK: 暫無下載任務
      subtitle:
        en: "Downloads from the Search page will appear here."
        zh-CN: 从「搜索下载」页面下载一本书后，任务会出现在这里。
