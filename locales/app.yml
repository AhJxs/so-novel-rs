# 本地书库页面（`src/gpui_app/pages/library.rs`）所有面向用户的字符串。
# 设计要点：
# - 序号（#xx）是 row 内的全局序号列文本，由 Rust 端 format!，不需要翻译。
# - 「全部」/「打开」/「位置」/「删除」/「取消」是按钮标签，跟 Settings 按钮分开
#   命名空间（Library.*）—— 即便日后 Settings 改文案也不会牵扯 Library。
# - 文件扩展名（epub/txt/zip/html/pdf）是技术名词，**不翻译**——用户看的就是扩展名，
#   翻译成"电子出版物"反而看不懂。
Library:
  page_title:
    en: Library
    zh-CN: 本地书库
    zh-HK: 本地書庫
  # PageHeader 副标题前缀，最终拼接为 "下载目录: <path>"。
  download_path_label:
    en: "Download directory"
    zh-CN: 下载目录
    zh-HK: 下載目錄
  filter_placeholder:
    en: "Filter by file name…"
    zh-CN: 按文件名过滤…
    zh-HK: 按檔案名稱過濾…
  filter_option_all:
    en: All
    zh-CN: 全部
    zh-HK: 全部
  action_open:
    en: Open
    zh-CN: 打开
    zh-HK: 打開
  action_reveal:
    en: Reveal
    zh-CN: 位置
    zh-HK: 位置
  action_delete:
    en: Delete
    zh-CN: 删除
    zh-HK: 刪除
  empty_title:
    en: "Library is empty"
    zh-CN: 本地书库为空
    zh-HK: 本地書庫為空
  empty_subtitle:
    en: "Download a book and it will appear here automatically."
    zh-CN: 下载一本书后，它会自动出现在这里。
    zh-HK: 下載一本書後，它會自動出現在這裡。
  scan_failed:
    en: "Scan failed"
    zh-CN: "扫描失败"
    zh-HK: "掃描失敗"
  delete_dialog:
    title:
      en: "Confirm delete"
      zh-CN: 确认删除
      zh-HK: 確認刪除
    # {file_name} 占位符 —— 调用 `ts_fmt("Library.delete_dialog.message", &[(... )])` 替换。
    message:
      en: "Are you sure you want to delete \"{file_name}\"? This action cannot be undone."
      zh-CN: "确定要删除 \"{file_name}\" 吗？此操作无法撤销。"
      zh-HK: "確定要刪除 \"{file_name}\" 嗎？此操作無法撤銷。"
    confirm_button:
      en: Delete
      zh-CN: 删除
      zh-HK: 刪除
    cancel_button:
      en: Cancel
      zh-CN: 取消
      zh-HK: 取消
  fallback_unknown_filename:
    en: "(unknown file name)"
    zh-CN: "(未知文件名)"
    zh-HK: "(未知檔案名稱)"
  # 修改时间列的 fallback（format_unix_secs 的三个错误分支）。
  time:
    unknown:
      en: "(unknown)"
      zh-CN: "(未知)"
      zh-HK: "(未知)"
    invalid:
      en: "(invalid time)"
      zh-CN: "(无效时间)"
      zh-HK: "(無效時間)"
    format_failed:
      en: "(format failed)"
      zh-CN: "(格式化失败)"
      zh-HK: "(格式化失敗)"

# 书源管理页面（`src/gpui_app/pages/sources.rs`）所有面向用户的字符串。
# 设计要点：
# - 跟 Library 同款 PageHeader + Toolbar + List + Pagination 布局，
#   但 actions 区保留「添加」「测速」两个功能按钮（library 没 actions，因为 watcher
#   实时刷新；sources 没有 watcher，所以保留手动触发入口）。
# - filter 命名空间跟 library 对齐：`Sources.filter.*` / `Sources.status.*`
# - 语言 tag 用 `Sources.action.delete` 同一个 key（行内删除按钮 + dialog confirm 按钮）
Sources:
  page_title:
    en: "Source management"
    zh-CN: 书源管理
    zh-HK: 書源管理
  page_subtitle:
    en: "Enable / disable, connectivity check, JSON import"
    zh-CN: 启用/禁用、连通性检测、JSON 导入
    zh-HK: 啟用/停用、連通性偵測、JSON 匯入
  filter:
    placeholder:
      en: "Filter by name or URL…"
      zh-CN: 按名称或 URL 过滤…
      zh-HK: 按名稱或 URL 過濾…
  status:
    all:
      en: All
      zh-CN: 全部
      zh-HK: 全部
    enabled:
      en: Enabled
      zh-CN: 启用
      zh-HK: 啟用
    disabled:
      en: Disabled
      zh-CN: 禁用
      zh-HK: 停用
  stat:
    total:
      en: Total
      zh-CN: 总数
      zh-HK: 總數
    enabled:
      en: Enabled
      zh-CN: 启用
      zh-HK: 啟用
    disabled:
      en: Disabled
      zh-CN: 禁用
      zh-HK: 停用
    available:
      en: Available
      zh-CN: 可用
      zh-HK: 可用
  health:
    progress:
      en: "checked"
      zh-CN: 已检测
      zh-HK: 已偵測
    # StatusBadge 显示在书源行右侧的 4 种标签（对应 `health_status_label`）。
    not_tested:
      en: "Not tested"
      zh-CN: 未测
      zh-HK: 未測
    error:
      en: Error
      zh-CN: 错误
      zh-HK: 錯誤
    # {status} 占位符 —— StatusBadge 显示 "HTTP 200" / "HTTP 404" 等。
    http_status:
      en: "HTTP {status}"
      zh-CN: "HTTP {status}"
      zh-HK: "HTTP {status}"
    # `format!("{:?}", err)` 退化分支：源错误但没 HTTP 响应（如 DNS 失败 / 超时）。
    # 调试输出太长不适合塞进 StatusBadge，用一句简短"网络错误"代替。
    network_error:
      en: "Network error"
      zh-CN: 网络错误
      zh-HK: 網路錯誤
  error:
    load_failed:
      en: "Rule load failed"
      zh-CN: 规则加载失败
      zh-HK: 規則載入失敗
  empty:
    title:
      en: "No sources imported"
      zh-CN: 暂未导入任何书源
      zh-HK: 暫未匯入任何書源
    subtitle:
      en: "Click the Add button on the top right to select a JSON file."
      zh-CN: 点击右上角「添加」选择 JSON 文件。
      zh-HK: 點擊右上角「添加」選擇 JSON 檔案。
  action:
    add:
      en: Add
      zh-CN: 添加
      zh-HK: 添加
    health_check:
      en: "Health check"
      zh-CN: 测速
      zh-HK: 測速
    delete:
      en: Delete
      zh-CN: 删除
      zh-HK: 刪除
  # 书源行内小 tag 的标签（language 已经是 rule.language 不需要翻译；
  # need_proxy 这个 tag 是 UI 提示文案要翻译）。
  tag:
    proxy:
      en: Proxy
      zh-CN: 代理
      zh-HK: 代理
  delete_dialog:
    title:
      en: "Confirm delete"
      zh-CN: 确认删除书源
      zh-HK: 確認刪除書源
    # {source_id} —— rule 的自增主键（用户看到的是 id，不是规则名；规则名可能为空）。
    message:
      en: "Are you sure you want to delete source #{source_id}? This action cannot be undone."
      zh-CN: "确定要删除书源 #{source_id} 吗？此操作无法撤销。"
      zh-HK: "確定要刪除書源 #{source_id} 嗎？此操作無法撤銷。"
    confirm:
      en: Delete
      zh-CN: 删除
      zh-HK: 刪除
    cancel:
      en: Cancel
      zh-CN: 取消
      zh-HK: 取消
  # 导入 JSON 后的反馈 toast。
  # {inserted} 实际写入条数 / {skipped} 因 url 重复被去重跳过的条数。
  # inserted=0 + skipped>0 → 全部已存在（warning 级别），
  # 否则 success 级别。
  import:
    result:
      en: "Imported {inserted}, skipped {skipped} duplicate(s)"
      zh-CN: "已导入 {inserted} 个，跳过 {skipped} 个重复"
      zh-HK: "已匯入 {inserted} 個，跳過 {skipped} 個重複"
  # 「添加」按钮弹出的 rfd 文件选择器文案。
  add_source:
    dialog_title:
      en: "Select source JSON file"
      zh-CN: 选择书源 JSON 文件
      zh-HK: 選擇書源 JSON 檔案
    filter_json:
      en: "JSON rule files"
      zh-CN: JSON 规则文件
      zh-HK: JSON 規則檔案
    filter_all:
      en: "All files"
      zh-CN: 所有文件
      zh-HK: 所有檔案

# 搜索下载页面（`src/gpui_app/pages/search.rs`）所有面向用户的字符串。
# 设计要点：
# - 选书源下拉第一项 value=""（"全部"=None），其余 "rule:{id}" 编码 source id，
#   confirm 回调里 strip_prefix 解析。"全部" label 走 Search.source.all。
# - 选章 / 全本 两个行内按钮。选章暂不实现，点击弹 info toast "功能即将推出"。
# - 全部已派下载任务反馈用 success toast（带 #N 任务 id），不阻塞 UI。
# - 行内元信息列：作者 / 最新章节，缺失时走 Search.result.unknown_* fallback。
# - 源 id badge 用 Search.result.source + ts_fmt 替换 {id} 占位符（不能直接
#   format! 拼字符串，否则切语言后占位符翻译也跟着拼，顺序会乱）。
Search:
  page_title:
    en: "Search & Download"
    zh-CN: 搜索下载
    zh-HK: 搜尋下載
  page_subtitle:
    en: "Search by book name or author; aggregate or single-source"
    zh-CN: "按书名 / 作者搜索；支持单源或全源聚合搜索"
    zh-HK: "按書名 / 作者搜尋；支援單源或全源聚合搜尋"
  filter:
    placeholder:
      en: "Book name / author"
      zh-CN: 书名 / 作者
      zh-HK: 書名 / 作者
  source:
    # 工具栏 "书源" label —— 在 Select 前的静态文字
    label:
      en: Source
      zh-CN: 书源
      zh-HK: 書源
    # Select 第一项 "聚合搜索"（value="all" = 跨书源搜索 = None）。
    # 切语言后下次展开下拉自动更新。
    aggregate:
      en: "All sources"
      zh-CN: "聚合搜索"
      zh-HK: "聚合搜尋"
  action:
    # 工具栏右侧搜索按钮
    search:
      en: Search
      zh-CN: 搜索
      zh-HK: 搜尋
    # 行内选章按钮 label + 不可用提示 toast 消息
    select_chapters:
      en: "Select Chapters"
      zh-CN: 选章
      zh-HK: 選章
    select_chapters_unavailable:
      en: "Coming soon"
      zh-CN: "功能即将推出"
      zh-HK: "功能即將推出"
    # 行内全本按钮 label
    download_whole:
      en: "Whole Book"
      zh-CN: 全本
      zh-HK: 全本
    # 全本下载成功后的 success toast 标题
    download_started:
      en: "Download queued"
      zh-CN: "已派下载任务"
      zh-HK: "已派下載任務"
  empty:
    title:
      en: "Enter a keyword to start searching"
      zh-CN: "输入关键词开始搜索"
      zh-HK: "輸入關鍵詞開始搜尋"
    subtitle:
      en: "Search by book name or author; single-source reduces network requests."
      zh-CN: "按书名或作者搜索；选单源可减少网络请求。"
      zh-HK: "按書名或作者搜尋；選單源可減少網絡請求。"
  source_status:
    # 每个源 status badge 上的"等待"标签（其他状态走原 SourceStatus::Ok/Err 文案）
    pending:
      en: Pending
      zh-CN: 等待
      zh-HK: 等待
    # "N 条" 的"条"字（Ok(n) 时拼成 "5 条"）
    format:
      en: results
      zh-CN: 条
      zh-HK: 條
  result:
    # 元信息列的两个 label（"作者: X" / "最新: Y"）
    author:
      en: Author
      zh-CN: 作者
      zh-HK: 作者
    latest_chapter:
      en: Latest
      zh-CN: 最新
      zh-HK: 最新
    # r.author 为 None 时的 fallback
    unknown_author:
      en: "(Unknown)"
      zh-CN: "(未知作者)"
      zh-HK: "(未知作者)"
    # r.latest_chapter 为 None 时的 fallback
    no_latest:
      en: "(No latest chapter)"
      zh-CN: "(无最新章节)"
      zh-HK: "(無最新章節)"
    # 源 id badge: "源 #{id}" —— {id} 占位符由 ts_fmt 替换
    source:
      en: "Source #{id}"
      zh-CN: "源 #{id}"
      zh-HK: "源 #{id}"
    # r.source_name 为空时的 fallback（行内书源名称列）
    unknown_source:
      en: "(Unknown source)"
      zh-CN: "(未知书源)"
      zh-HK: "(未知書源)"
