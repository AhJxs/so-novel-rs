    format:
      en: results
      zh-CN: 条
      zh-HK: 條
  result:
    # r.author 为 None 时的 fallback
    unknown_author:
      en: "(Unknown)"
      zh-CN: "(未知作者)"
      zh-HK: "(未知作者)"
    # r.latest_chapter 为 None 时的 fallback
    no_latest:
      en: "(No latest chapter)"
      zh-CN: "(无最新章节)"
      zh-HK: "(無最新章節)"
