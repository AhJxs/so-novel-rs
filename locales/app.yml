  page_title:
    en: "Search & Download"
    zh-CN: 搜索下载
    zh-TW: 搜尋下載
  page_subtitle:
    en: "Search by book name or author; aggregate or single-source"
    zh-CN: "按书名 / 作者搜索；支持单源或全源聚合搜索"
    zh-TW: "按書名 / 作者搜尋；支援單源或全源聚合搜尋"
