    title:
      en: "Select Chapters to Download"
      zh-CN: "选择下载章节"
      zh-HK: "選擇下載章節"
    # 起止章节输入 label
    start:
      en: Start
      zh-CN: 起始
      zh-HK: 起始
    end:
      en: End
      zh-CN: 结束
      zh-HK: 結束
    # "共 N 章" 的 N 占位符文案
    total:
      en: "{n} chapters in total"
      zh-CN: "共 {n} 章"
      zh-HK: "共 {n} 章"
    # 选中范围预览行 label
    preview:
      en: Selected
      zh-CN: 选中
      zh-HK: 選中
    # TOC 还在拉的占位
    loading:
      en: "Loading chapter list…"
      zh-CN: "正在获取章节列表…"
      zh-HK: "正在取得章節列表…"
    # TOC 拉取失败
    failed:
      en: "Failed to load chapter list"
      zh-CN: "章节列表获取失败"
      zh-HK: "章節列表取得失敗"
    # 范围无效（非数字 / start>end / 超界）toast
