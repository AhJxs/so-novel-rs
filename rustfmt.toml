# rustfmt 配置。稳定工具链下可用的选项。
# unstable（需要 nightly）的选项已移除 —— 如需用回，切到 `nightly` 工具链
# 并把下面注释掉的选项恢复。

edition = "2024"
max_width = 100
use_field_init_shorthand = true
use_try_shorthand = true

# import 合并/分组（稳定版只有 reorder_imports，无 granularity / group_imports）
reorder_imports = true
# 以下需要 nightly：
# imports_granularity = "Crate"
# group_imports = "StdExternalCrate"

# 注释换行与 doc 代码格式化（稳定版不支持）
# wrap_comments = true
# comment_width = 98
# format_code_in_doc_comments = true
# normalize_comments = false

# 链式调用缩进 — 与 rustfmt 默认一致
chain_width = 60
# 函数参数列表单行长度 — 触发换行
fn_params_layout = "Tall"
